services:
  # 1. Base de données PostgreSQL
  inventree-db:
    image: postgres:17
    container_name: inventree-db
    restart: unless-stopped
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdb
      - POSTGRES_USER=${INVENTREE_DB_USER}
      - POSTGRES_PASSWORD=${INVENTREE_DB_PASSWORD}
      - POSTGRES_DB=${INVENTREE_DB_NAME}
    volumes:
      - ${INVENTREE_EXT_VOLUME}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTREE_DB_USER} -d ${INVENTREE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 2.5. Migration one-shot job
  inventree-migrate:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-migrate
    restart: "no"
    depends_on:
      inventree-db:
        condition: service_healthy
    command: ["sh", "-lc", "invoke migrate"]
    environment:
      - INVENTREE_DB_ENGINE=postgresql
      - INVENTREE_DB_HOST=inventree-db
      - INVENTREE_DB_PORT=5432
      - INVENTREE_DB_NAME=${INVENTREE_DB_NAME}
      - INVENTREE_DB_USER=${INVENTREE_DB_USER}
      - INVENTREE_DB_PASSWORD=${INVENTREE_DB_PASSWORD}
      - INVENTREE_SITE_URL=${INVENTREE_SITE_URL}
    volumes:
      - ${INVENTREE_EXT_VOLUME}/data:/home/inventree/data

  # 2. Serveur principal InvenTree
  inventree-server:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-server
    restart: unless-stopped
    depends_on:
      inventree-db:
        condition: service_healthy
      inventree-migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      - INVENTREE_DB_ENGINE=postgresql
      - INVENTREE_DB_HOST=inventree-db
      - INVENTREE_DB_PORT=5432
      - INVENTREE_DB_NAME=${INVENTREE_DB_NAME}
      - INVENTREE_DB_USER=${INVENTREE_DB_USER}
      - INVENTREE_DB_PASSWORD=${INVENTREE_DB_PASSWORD}
      - INVENTREE_SITE_URL=${INVENTREE_SITE_URL}
      - INVENTREE_ADMIN_USER=${INVENTREE_ADMIN_USER}
      - INVENTREE_ADMIN_PASSWORD=${INVENTREE_ADMIN_PASSWORD}
      - INVENTREE_ADMIN_EMAIL=${INVENTREE_ADMIN_EMAIL}
    volumes:
      # Les données persistantes d'InvenTree (médias, plugins, clés, etc.)
      - ${INVENTREE_EXT_VOLUME}/data:/home/inventree/data
      # Configuration gunicorn
      - ./gunicorn.conf.py:/home/inventree/contrib/container/gunicorn.conf.py:ro

  # 3. Processus d'arrière-plan (Worker)
  inventree-worker:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-worker
    restart: unless-stopped
    command: invoke worker
    depends_on:
      inventree-server:
        condition: service_started
    environment:
      - INVENTREE_DB_ENGINE=postgresql
      - INVENTREE_DB_HOST=inventree-db
      - INVENTREE_DB_PORT=5432
      - INVENTREE_DB_NAME=${INVENTREE_DB_NAME}
      - INVENTREE_DB_USER=${INVENTREE_DB_USER}
      - INVENTREE_DB_PASSWORD=${INVENTREE_DB_PASSWORD}
      - INVENTREE_SITE_URL=${INVENTREE_SITE_URL}
    volumes:
      - ${INVENTREE_EXT_VOLUME}/data:/home/inventree/data

  # 4. Serveur Proxy (Caddy) pour les fichiers statiques
  inventree-proxy:
    image: caddy:alpine
    container_name: inventree-proxy
    restart: unless-stopped
    depends_on:
      inventree-server:
        condition: service_started
    ports:
      - "${INVENTREE_WEB_PORT:-8080}:80"
    environment:
      - INVENTREE_SITE_URL=${INVENTREE_SITE_URL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${INVENTREE_EXT_VOLUME}/data/static:/var/www/static:ro
      - ${INVENTREE_EXT_VOLUME}/data/media:/var/www/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: